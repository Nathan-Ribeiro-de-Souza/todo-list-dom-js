<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="normalize.css">
  <link rel="stylesheet" href="style.css">
  <title>To-Do List</title>
</head>

<body>
  <h1 class="title">To-Do List</h1>
  
  <div class="container">
  
  <div class="controls">

    <label for="taskInput" class="visually-hidden">New task</label>
  <input type="text" placeholder="Add a new task" id="taskInput">

  <button type="button" id="addTaskBtn" class="addButton">Add</button>

  <button type="button" id="deleteAllBtn">Delete All</button>

  <button type="button" title ='DarkMode / LightMode' id="themeToggle">🌜</button>
  </div>

<ul class="task-list"></ul>
  </div>
  
  <script src="script.js"></script>
  
</body>
</html>
